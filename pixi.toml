[workspace]
channels = ["conda-forge","pytorch"]
name = "qnn"
platforms = ["win-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.14.*"

[pypi-dependencies]
# onnxruntime-genai is NOT managed by pixi - must be installed manually from source build:
#   pixi run pip install --force-reinstall --no-deps build/Windows/RelWithDebInfo/wheel/onnxruntime_genai-*.whl
pip = ">=26.0.1, <27"
requests = ">=2.33.1, <3"
onnxruntime = ">=1.24.4, <2"
onnxruntime-qnn = ">=2.0.0, <3"
huggingface-hub = ">=0.26.0"
matplotlib = ">=3.9"
